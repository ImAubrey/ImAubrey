- {name: unlockersg, server: hkunlocksg.qcjs.one, port: 11451, type: vmess, uuid: 1345678-1234-1234-1234-123456789012, alterId: 0, cipher: auto, tls: false, skip-cert-verify: true, network: tcp, udp: true}
  
